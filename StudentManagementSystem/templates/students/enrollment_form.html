{% extends 'students/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>Student *</label>{{ form.student }}</div>
    <div class="form-group"><label>Course *</label>{{ form.course }}</div>
    <div class="form-group"><label>Semester *</label>{{ form.semester }}</div>
    <div class="form-group"><label>Grade</label>{{ form.grade }}</div>
    <div style="display:flex;gap:12px">
      <button type="submit" class="btn btn-primary">💾 Save Enrollment</button>
      <a href="{% url 'enrollment_list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
