{% extends 'students/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:600px">
  <form method="post">
    {% csrf_token %}
    <div class="form-grid">
      <div class="form-group"><label>Course Name *</label>{{ form.name }}</div>
      <div class="form-group"><label>Code *</label>{{ form.code }}</div>
      <div class="form-group"><label>Department *</label>{{ form.department }}</div>
      <div class="form-group"><label>Credits</label>{{ form.credits }}</div>
    </div>
    <div class="form-group"><label>Description</label>{{ form.description }}</div>
    <div style="display:flex;gap:12px">
      <button type="submit" class="btn btn-primary">💾 Save Course</button>
      <a href="{% url 'course_list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
