{% extends 'students/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>Department Name *</label>{{ form.name }}</div>
    <div class="form-group"><label>Code *</label>{{ form.code }}</div>
    <div style="display:flex;gap:12px">
      <button type="submit" class="btn btn-primary">💾 Save</button>
      <a href="{% url 'department_list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
