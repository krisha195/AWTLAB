<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if edit %}Edit{% else %}View{% endif %} Assignment — AssignFlow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="page-wrapper">

    <div class="header">
        <h1><i class="fa-solid fa-graduation-cap"></i> AssignFlow</h1>
    </div>

    <div class="card detail-card">
        {% if edit %}
        <h2 class="card-title"><i class="fa-solid fa-pen"></i> Edit Assignment</h2>
        <form action="/edit/{{ a.id }}" method="POST" class="add-form">
            <div class="form-group full-width">
                <label>Title</label>
                <input type="text" name="title" value="{{ a.title }}" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" name="due_date" value="{{ a.due_date }}" required>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority">
                        {% for p in ['Low', 'Medium', 'High'] %}
                        <option value="{{ p }}" {% if a.priority == p %}selected{% endif %}>{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group full-width">
                <label>Status</label>
                <select name="status">
                    {% for s in ['Pending', 'Done'] %}
                    <option value="{{ s }}" {% if a.status == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-submit"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
        </form>

        {% else %}
        <h2 class="card-title"><i class="fa-solid fa-circle-info"></i> Assignment Details</h2>
        <div class="detail-row"><span>Title</span><strong>{{ a.title }}</strong></div>
        <div class="detail-row"><span>Due Date</span><strong>{{ a.due_date.strftime('%d %B %Y') }}</strong></div>
        <div class="detail-row">
            <span>Priority</span>
            <strong class="priority-tag priority-{{ a.priority.lower() }}">{{ a.priority }}</strong>
        </div>
        <div class="detail-row">
            <span>Status</span>
            <strong class="status-badge status-{{ a.status.lower() }}">
                {% if a.status == 'Done' %}<i class="fa-solid fa-circle-check"></i>
                {% else %}<i class="fa-regular fa-clock"></i>{% endif %}
                {{ a.status }}
            </strong>
        </div>
        {% endif %}

        <a href="/" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
    </div>

</div>
</body>
</html>
