<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask To-Do App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>My To-Do List</h1>

        <form action="/add" method="POST" class="task-form">
            <input type="text" name="task" placeholder="Enter a task" required>
            <button type="submit">Add</button>
        </form>

        <ul class="task-list">
            {% for task in tasks %}
                <li>
                    <span class="{% if task.done %}done{% endif %}">
                        {{ task.name }}
                    </span>

                    <div class="actions">
                        <a href="/task/{{ task.id }}">View</a>
                        <a href="/done/{{ task.id }}">
                            {% if task.done %}Undo{% else %}Done{% endif %}
                        </a>
                        <a href="/delete/{{ task.id }}" class="delete-btn">Delete</a>
                    </div>
                </li>
            {% else %}
                <p>No tasks added yet.</p>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
