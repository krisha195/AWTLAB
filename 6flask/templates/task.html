<!DOCTYPE html>
<html>
<head>
    <title>Task Details</title>
</head>
<body>

<h2>Task Details</h2>

<p><strong>ID:</strong> {{ task.id }}</p>
<p><strong>Name:</strong> {{ task.name }}</p>
<p><strong>Status:</strong> 
    {% if task.done %}
        Completed
    {% else %}
        Pending
    {% endif %}
</p>

<a href="/">Back</a>

</body>
</html>
