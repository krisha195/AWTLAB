<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopCart</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<div id="authScreen" class="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">🛍️ ShopCart</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword"  />
      </div>
      <div id="loginError" class="form-error"></div>
      <button class="btn-full" onclick="login()">Login</button>
      <p class="auth-hint">No account? <a href="#" onclick="switchTab('register')">Register</a></p>
    </div>

    <!-- Register -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="regName" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min 6 characters" />
      </div>
      <div id="registerError" class="form-error"></div>
      <button class="btn-full" onclick="register()">Create Account</button>
      <p class="auth-hint">Have an account? <a href="#" onclick="switchTab('login')">Login</a></p>
    </div>
  </div>
</div>

<div id="app" style="display:none">

  <nav class="navbar">
    <div class="nav-brand">🛍️ ShopCart</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showSection('shop')">Shop</button>
      <button class="nav-tab" onclick="showSection('cart')">
        Cart <span id="cartBadge" class="badge" style="display:none">0</span>
      </button>
      <button class="nav-tab" onclick="showSection('orders')">Orders</button>
      <button class="nav-tab" onclick="showSection('log')">Event Log</button>
    </div>
    <div class="nav-right">
      <span id="navUser" class="nav-user"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <section id="shopSection" class="section">
    <div class="section-head">
      <h2>Products</h2>
    </div>
    <div id="productsGrid" class="products-grid"></div>
  </section>

  <section id="cartSection" class="section" style="display:none">
    <div class="section-head">
      <h2>Your Cart</h2>
    </div>
    <div id="cartContent"></div>
  </section>

  <section id="ordersSection" class="section" style="display:none">
    <div class="section-head">
      <h2>Order History</h2>
    </div>
    <div id="ordersContent"></div>
  </section>

  <section id="logSection" class="section" style="display:none">
    <div class="section-head">
      <h2>Event Log</h2>
      <p>Live server events via Node.js EventEmitter</p>
    </div>
    <div id="logContent" class="log-box"></div>
  </section>

</div>

<div id="toast" class="toast"></div>

<script>
  let currentUser = null; 

  function switchTab(tab) {
    document.getElementById('loginForm').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
    document.querySelectorAll('.auth-tab').forEach((b, i) =>
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'))
    );
    document.getElementById('loginError').textContent = '';
    document.getElementById('registerError').textContent = '';
  }

  async function login() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl    = document.getElementById('loginError');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
    const res  = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, password }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.message; return; }
    currentUser = { username: data.username, email: data.email };
    enterApp();
  }

  async function register() {
    const username = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const errEl    = document.getElementById('registerError');
    errEl.textContent = '';
    if (!username || !email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
    const res  = await fetch('/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username, email, password }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.message; return; }
    showToast('Account created! Please login.');
    switchTab('login');
    document.getElementById('loginEmail').value = email;
  }

  function enterApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('navUser').textContent = `Hi, ${currentUser.username}`;
    loadProducts();
    updateCartBadge();
  }

  function logout() {
    currentUser = null;
    document.getElementById('authScreen').style.display = '';
    document.getElementById('app').style.display = 'none';
    switchTab('login');
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
  }

  function showSection(name) {
    ['shop','cart','orders','log'].forEach(s => {
      document.getElementById(s + 'Section').style.display = s === name ? '' : 'none';
    });
    document.querySelectorAll('.nav-tab').forEach((b, i) => {
      b.classList.toggle('active', ['shop','cart','orders','log'][i] === name);
    });
    if (name === 'cart')   loadCart();
    if (name === 'orders') loadOrders();
    if (name === 'log')    loadLog();
  }

  async function loadProducts() {
    const products = await fetch('/products').then(r => r.json());
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = products.map(p => `
      <div class="product-card">
        <div class="product-emoji">${p.emoji}</div>
        <div class="product-info">
          <div class="product-category">${p.category}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">INR. ${p.price.toLocaleString()}</div>
        </div>
        <button class="btn-add" onclick="addToCart(${p.id})">+ Add to Cart</button>
      </div>
    `).join('');
  }

  async function addToCart(productId) {
    const res  = await fetch('/cart', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: currentUser.email, productId }) });
    const data = await res.json();
    if (!res.ok) { showToast(data.message, 'error'); return; }
    showToast('Added to cart!');
    updateCartBadge();
  }

  async function updateCartBadge() {
    const cart  = await fetch(`/cart?email=${encodeURIComponent(currentUser.email)}`).then(r => r.json());
    const count = cart.reduce((s, i) => s + i.qty, 0);
    const badge = document.getElementById('cartBadge');
    badge.textContent = count;
    badge.style.display = count > 0 ? 'inline-flex' : 'none';
  }

  async function loadCart() {
    const cart = await fetch(`/cart?email=${encodeURIComponent(currentUser.email)}`).then(r => r.json());
    const el = document.getElementById('cartContent');
    if (cart.length === 0) {
      el.innerHTML = `<div class="empty-state">🛒<p>Your cart is empty</p><button class="btn-outline" onclick="showSection('shop')">Browse Products</button></div>`;
      return;
    }
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    el.innerHTML = `
      <div class="cart-list">
        ${cart.map(item => `
          <div class="cart-item">
            <span class="ci-emoji">${item.emoji}</span>
            <div class="ci-info">
              <div class="ci-name">${item.name}</div>
              <div class="ci-price">INR. ${item.price.toLocaleString()} each</div>
            </div>
            <div class="ci-qty">
              <button onclick="changeQty(${item.id}, -1)">−</button>
              <span>${item.qty}</span>
              <button onclick="changeQty(${item.id}, 1)">+</button>
            </div>
            <div class="ci-subtotal">INR. ${(item.price * item.qty).toLocaleString()}</div>
            <button class="ci-remove" onclick="removeItem(${item.id})">✕</button>
          </div>
        `).join('')}
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total</span>
          <span class="cart-total-amt">INR. ${total.toLocaleString()}</span>
        </div>
        <button class="btn-checkout" onclick="checkout()">Place Order →</button>
      </div>`;
  }

  async function changeQty(productId, delta) {
    await fetch('/cart', { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: currentUser.email, productId, delta }) });
    loadCart(); updateCartBadge();
  }

  async function removeItem(productId) {
    await fetch('/cart', { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: currentUser.email, productId }) });
    loadCart(); updateCartBadge();
  }

  async function checkout() {
    const res  = await fetch('/checkout', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: currentUser.email }) });
    const data = await res.json();
    if (!res.ok) { showToast(data.message, 'error'); return; }
    showToast(`Order placed! ${data.order.id}`);
    updateCartBadge();
    loadCart();
  }

  async function loadOrders() {
    const orders = await fetch(`/orders?email=${encodeURIComponent(currentUser.email)}`).then(r => r.json());
    const el = document.getElementById('ordersContent');
    if (orders.length === 0) {
      el.innerHTML = `<div class="empty-state">📦<p>No orders yet</p></div>`;
      return;
    }
    el.innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="order-head">
          <span class="order-id">${o.id}</span>
          <span class="order-date">${o.date}</span>
          <span class="order-total">INR. ${o.total.toLocaleString()}</span>
        </div>
        <div class="order-items">
          ${o.items.map(i => `<span class="order-item-tag">${i.emoji} ${i.name} ×${i.qty}</span>`).join('')}
        </div>
      </div>
    `).join('');
  }

  async function loadLog() {
    const events = await fetch('/events').then(r => r.json());
    const el = document.getElementById('logContent');
    if (events.length === 0) {
      el.innerHTML = '<div class="log-empty">No events yet. Start shopping!</div>';
      return;
    }
    el.innerHTML = events.map(e => `
      <div class="log-entry log-${e.type}">
        <span class="log-time">${e.time}</span>
        <span class="log-type">${e.type}</span>
        <span class="log-msg">${e.message}</span>
      </div>
    `).join('');
  }

  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast toast-${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
